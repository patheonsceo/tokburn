<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>tokburn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header-left">
        <span class="header-icon">&#x1F525;</span>
        <h1 class="header-title">tokburn</h1>
      </div>
      <span class="header-version">v1.0.0</span>
    </header>

    <!-- Today's Summary -->
    <section class="section">
      <h2 class="section-title">Today</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">Total Tokens</div>
          <div class="summary-value" id="total-tokens">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Requests</div>
          <div class="summary-value" id="request-count">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Input</div>
          <div class="summary-value small" id="input-tokens">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Output</div>
          <div class="summary-value small" id="output-tokens">0</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-used">0%</span>
          <span id="progress-limit">of 500K limit</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- 7-Day Chart -->
    <section class="section">
      <h2 class="section-title">Last 7 Days</h2>
      <div class="chart" id="chart">
        <!-- Bars generated by JS -->
      </div>
      <div class="chart-labels" id="chart-labels">
        <!-- Day labels generated by JS -->
      </div>
    </section>

    <!-- Settings -->
    <section class="section">
      <h2 class="section-title">Settings</h2>

      <div class="setting-row">
        <label class="setting-label" for="limit-slider">
          Daily Limit: <span id="limit-display">500K</span>
        </label>
        <input
          type="range"
          id="limit-slider"
          class="setting-slider"
          min="100000"
          max="1000000"
          step="50000"
          value="500000"
        >
      </div>

      <div class="setting-row">
        <label class="setting-label">Show Pill Overlay</label>
        <button class="toggle-btn active" id="pill-toggle" aria-label="Toggle pill visibility">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <div class="setting-row">
        <button class="reset-btn" id="reset-btn">Reset All Data</button>
      </div>
    </section>

    <footer class="footer">
      Fully local &middot; Zero tracking &middot; MIT
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
